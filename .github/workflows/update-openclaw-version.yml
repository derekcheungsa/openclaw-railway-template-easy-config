name: Update OpenClaw Version

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  update-openclaw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Get latest openclaw release
        id: latest
        run: |
          # GitHub release tag is e.g. v2026.3.28; GHCR image tag drops the 'v'
          GH_TAG=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r '.tag_name')
          IMAGE_TAG="${GH_TAG#v}"
          echo "gh_tag=$GH_TAG" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Get current image tag from Dockerfile
        id: current
        run: |
          CURRENT=$(grep 'ARG OPENCLAW_IMAGE=' Dockerfile.railway | sed 's|.*openclaw:||')
          echo "image_tag=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update Dockerfile
        if: steps.latest.outputs.image_tag != steps.current.outputs.image_tag
        run: |
          sed -i 's|ARG OPENCLAW_IMAGE=.*|ARG OPENCLAW_IMAGE=ghcr.io/openclaw/openclaw:${{ steps.latest.outputs.image_tag }}|' Dockerfile.railway

      - name: Create Pull Request
        if: steps.latest.outputs.image_tag != steps.current.outputs.image_tag
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump openclaw image to ${{ steps.latest.outputs.image_tag }}"
          branch: "chore/openclaw-${{ steps.latest.outputs.image_tag }}"
          title: "chore: bump openclaw image to ${{ steps.latest.outputs.image_tag }}"
          body: |
            Automated weekly check found a new OpenClaw release.

            - **Previous version:** `${{ steps.current.outputs.image_tag }}`
            - **New version:** `${{ steps.latest.outputs.image_tag }}`

            [Release notes](https://github.com/openclaw/openclaw/releases/tag/${{ steps.latest.outputs.gh_tag }})

            > Merge this PR to trigger a Railway redeploy with the new image.
          delete-branch: true
